<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetFlow — Simple Mode</title>
    <style>
        /* [KEEPING YOUR CSS FROM THE PROMPT] */
        /* ... All the styles you provided ... */
        
        /* ADDING THEME & MODE TOGGLE STYLES */
        .nav-end {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            margin-top: auto;
            border-top: 0.5px solid var(--border);
            padding-top: 15px;
        }
        
        .mode-btn {
            background: var(--surface2);
            border: 0.5px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .mode-btn:hover { background: var(--accent-bg); color: var(--accent-text); }
        
        /* Dark mode manual override class */
        body.dark-theme {
            --bg:#1c1c1a;--surface:#252523;--surface2:#2e2e2b;--border:rgba(255,255,255,0.08);
            --text:#f0efe8;--text2:#a8a79f;--text3:#6a6964;
            --accent:#afa9ec;--accent-bg:#26215c;--accent-text:#cecbf6;
            --teal:#5dcaa5;--teal-bg:#04342c;
            --amber:#ef9f27;--amber-bg:#412402;
            --red:#e24b4a;--red-bg:#501313;
            --green:#97c459;--green-bg:#173404;
            --coral:#f0997b;--coral-bg:#4a1b0c;
        }
    </style>
</head>
<body id="body">

<div class="app" id="app">
    <aside class="sidebar" id="sidebar">
        <div class="sb-brand">
            <div class="sb-logo">Net<span>Flow</span></div>
            <div class="sb-sub">Networking Concepts</div>
        </div>
        
        <div id="nav-tree"></div>

        <div class="sb-progress">
            <div class="sp-label"><span>Progress</span><span id="prog-count">0 / 20</span></div>
            <div class="sp-track"><div class="sp-fill" id="prog-fill" style="width:0%"></div></div>
        </div>

        <div class="nav-end">
            <button class="mode-btn" id="theme-toggle" title="Toggle Dark/Light">🌙</button>
            <a href="index.html" class="mode-btn" title="Back to Modern UI">✨ Modern</a>
        </div>
    </aside>

    <main class="main" id="main-content">
        <div class="page-header">
            <h1 class="page-title">Learn <em>Networking</em> Fundamentals</h1>
            <p class="page-desc">A comprehensive guide from the basics of data transfer to advanced global infrastructure and cybersecurity.</p>
            <div class="search-bar" style="margin-top:16px;margin-bottom:0">
                <span class="search-icon">⌕</span>
                <input type="text" id="search-input" placeholder="Search concepts, terms, protocols…">
            </div>
        </div>

        <div class="stats-row">
            <div class="stat"><div class="stat-val" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
            <div class="stat"><div class="stat-val">20</div><div class="stat-lbl">Chapters</div></div>
            <div class="stat"><div class="stat-val">6</div><div class="stat-lbl">Levels</div></div>
        </div>

        <div id="chapters-container"></div>
        <div class="no-results" id="no-results" style="display:none">
            <div class="nr-icon">◌</div>
            <p>Nothing found — try "router", "TCP", or "duplex"</p>
        </div>
    </main>
</div>

<script>
// [CHAPTERS DATA ARRAY - Keep exactly as you have it]
const CHAPTERS = [ /* ... same as your prompt ... */ ];

let done = new Set();

// --- SYNC LOGIC ---

// 1. Load data from LocalStorage
function loadPersistentState() {
    const savedDone = localStorage.getItem('netflow_done');
    if (savedDone) {
        done = new Set(JSON.parse(savedDone));
    }
    
    const savedTheme = localStorage.getItem('netflow_theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('theme-toggle').textContent = '☀️';
    }
}

// 2. Save data to LocalStorage
function savePersistentState() {
    localStorage.setItem('netflow_done', JSON.stringify(Array.from(done)));
}

// --- UI LOGIC ---

function buildNav(){
    const tree = document.getElementById('nav-tree');
    tree.innerHTML = ''; // Clear existing
    const groups = {};
    CHAPTERS.forEach((c, i) => {
        if(!groups[c.cat]) groups[c.cat] = [];
        groups[c.cat].push({...c, i});
    });
    Object.entries(groups).forEach(([cat, items]) => {
        const sec = document.createElement('div');
        sec.className = 'sb-section';
        const lbl = document.createElement('div');
        lbl.className = 'sb-section-label';
        lbl.textContent = cat;
        sec.appendChild(lbl);
        items.forEach(({num, title, i}) => {
            const btn = document.createElement('button');
            btn.className = 'nav-item' + (i === 0 ? ' active' : '');
            btn.id = 'nav-' + i;
            btn.innerHTML = `<span class="nav-num">${num}</span>${title}`;
            btn.onclick = () => scrollToChapter(i);
            sec.appendChild(btn);
        });
        tree.appendChild(sec);
    });
}

// ... [Keep your existing scrollToChapter, buildChapters, renderChapter, renderFlow, renderOSI, renderAcc, renderQuiz, renderChNav functions] ...

function updateProgress() {
    const n = done.size, t = CHAPTERS.length;
    document.getElementById('prog-count').textContent = `${n} / ${t}`;
    document.getElementById('prog-fill').style.width = `${n/t*100}%`;
    document.getElementById('stat-done').textContent = n;
    
    // Sync with Mark Done buttons
    document.querySelectorAll('.done-btn').forEach(btn => {
        const idx = +btn.dataset.idx;
        if(done.has(idx)){
            btn.innerHTML = '<span class="icon">✓</span> Done';
            btn.classList.add('done');
        } else {
            btn.innerHTML = '<span class="icon">○</span> Mark done';
            btn.classList.remove('done');
        }
    });
    
    savePersistentState(); // Save every time progress changes
}

// --- INITIALIZATION ---

document.getElementById('theme-toggle').onclick = function() {
    const isDark = document.body.classList.toggle('dark-theme');
    this.textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('netflow_theme', isDark ? 'dark' : 'light');
};

// Start the app
loadPersistentState();
buildNav();
buildChapters();
initSearch();
updateProgress();

</script>
</body>
</html>
