<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetFlow — Simple Mode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #f9f8f6; --surface: #ffffff; --surface2: #f4f3f0; --border: rgba(0,0,0,0.08);
            --text: #1a1a18; --text2: #5a5955; --text3: #9a9894;
            --accent: #5344b7; --accent-bg: #eeedfe; --accent-text: #3c3489;
            --teal: #0f6e56; --teal-bg: #e1f5ee;
            --amber: #854f0b; --amber-bg: #faeeda;
            --red: #a32d2d; --red-bg: #fcebeb;
            --green: #3b6d11; --green-bg: #eaf3de;
            --coral: #993c1d; --coral-bg: #faece7;
            --r: 10px; --r-sm: 6px; --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
        }
        
        body.dark-theme {
            --bg: #1c1c1a; --surface: #252523; --surface2: #2e2e2b; --border: rgba(255,255,255,0.08);
            --text: #f0efe8; --text2: #a8a79f; --text3: #6a6964;
            --accent: #afa9ec; --accent-bg: #26215c; --accent-text: #cecbf6;
            --teal: #5dcaa5; --teal-bg: #04342c;
            --amber: #ef9f27; --amber-bg: #412402;
            --red: #e24b4a; --red-bg: #501313;
            --green: #97c459; --green-bg: #173404;
            --coral: #f0997b; --coral-bg: #4a1b0c;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1a; --surface: #252523; --surface2: #2e2e2b; --border: rgba(255,255,255,0.08);
                --text: #f0efe8; --text2: #a8a79f; --text3: #6a6964;
                --accent: #afa9ec; --accent-bg: #26215c; --accent-text: #cecbf6;
                --teal: #5dcaa5; --teal-bg: #04342c;
                --amber: #ef9f27; --amber-bg: #412402;
                --red: #e24b4a; --red-bg: #501313;
                --green: #97c459; --green-bg: #173404;
                --coral: #f0997b; --coral-bg: #4a1b0c;
            }
        }
        
        body { font-family: var(--font-sans, system-ui, sans-serif); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; }

        .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; max-width: 1100px; margin: 0 auto; }

        .sidebar { position: sticky; top: 0; height: 100vh; overflow-y: auto; border-right: 0.5px solid var(--border); padding: 20px 0; background: var(--surface); display: flex; flex-direction: column; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .sb-brand { padding: 0 20px 20px; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; }
        .sb-logo { font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
        .sb-logo span { color: var(--accent); }
        .sb-sub { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
        .sb-section { padding: 0 12px; margin-bottom: 4px; }
        .sb-section-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 8px 4px; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--accent-bg); color: var(--accent-text); }
        .nav-num { font-size: 10px; font-weight: 500; color: var(--text3); min-width: 18px; }
        .nav-item.active .nav-num { color: var(--accent); }
        .sb-progress { padding: 16px 20px; border-top: 0.5px solid var(--border); margin-top: 8px; }
        .sp-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 6px; }
        .sp-track { height: 3px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
        .sp-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s; }

        .main { padding: 32px 40px; overflow-x: hidden; }
        .page-header { margin-bottom: 40px; padding-bottom: 28px; border-bottom: 0.5px solid var(--border); }
        .page-title { font-size: 28px; font-weight: 500; line-height: 1.25; letter-spacing: -0.02em; color: var(--text); }
        .page-title em { color: var(--accent); font-style: normal; }
        .page-desc { font-size: 14px; color: var(--text2); margin-top: 8px; max-width: 480px; line-height: 1.6; }

        .chapter { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 0.5px solid var(--border); }
        .chapter:last-of-type { border-bottom: none; }
        .ch-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        .ch-left { display: flex; align-items: center; gap: 12px; }
        .ch-num { font-size: 10px; font-weight: 500; color: var(--text3); background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-sm); padding: 4px 8px; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
        .ch-title { font-size: 19px; font-weight: 500; letter-spacing: -0.015em; color: var(--text); }
        .ch-cat { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
        .done-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--r-sm); border: 0.5px solid var(--border); background: none; color: var(--text3); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
        .done-btn:hover { border-color: var(--accent); color: var(--accent); }
        .done-btn.done { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); }
        .done-btn .icon { font-size: 14px; }

        .callout { border-radius: var(--r); padding: 16px 20px; margin-bottom: 20px; border-left: 3px solid; }
        .callout.blue { background: var(--accent-bg); border-color: var(--accent); }
        .callout.teal { background: var(--teal-bg); border-color: var(--teal); }
        .callout p { font-size: 14px; color: var(--text2); line-height: 1.6; }
        .callout strong { color: var(--text); }
        .callout mark { background: var(--accent-bg); color: var(--accent-text); padding: 1px 4px; border-radius: 3px; }

        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media(max-width: 700px) { .g2 { grid-template-columns: 1fr; } }
        .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 18px; }
        .card h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .card-icon { font-size: 14px; width: 26px; height: 26px; border-radius: var(--r-sm); background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card p, .card li { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
        .card ul { padding-left: 18px; }
        .card li { margin-bottom: 4px; }
        .card li strong { color: var(--text); }
        .card code { font-family: var(--font-mono, monospace); font-size: 12px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--accent-text); }
        .card .note { font-size: 12px; color: var(--text3); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }

        .acc { border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
        .acc-item:not(:last-child) { border-bottom: 0.5px solid var(--border); }
        .acc-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text); transition: background 0.15s; user-select: none; }
        .acc-head:hover { background: var(--surface2); }
        .acc-head .acc-icon { font-size: 14px; margin-right: 8px; }
        .acc-arr { color: var(--text3); transition: transform 0.2s; font-style: normal; font-size: 12px; }
        .acc-body { display: none; padding: 0 18px 16px; background: var(--surface); }
        .acc-body.open { display: block; }
        .acc-body p, .acc-body li { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
        .acc-body ul { padding-left: 18px; margin-top: 8px; }
        .acc-body li { margin-bottom: 4px; }
        .acc-body li strong { color: var(--text); }
        .acc-body strong { color: var(--text); }
        .acc-body mark { background: var(--accent-bg); color: var(--accent-text); padding: 1px 4px; border-radius: 3px; }
        .acc-item.open .acc-arr { transform: rotate(90deg); }
        .acc-item.open .acc-head { background: var(--surface2); }

        .section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 16px; }
        .section-card h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
        .section-card ul { padding-left: 18px; }
        .section-card p, .section-card li { font-size: 13.5px; color: var(--text2); line-height: 1.6; }
        .section-card li { margin-bottom: 5px; }
        .section-card li strong { color: var(--text); }
        .section-card code { font-family: var(--font-mono, monospace); font-size: 12px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--accent-text); }
        .section-card mark { background: var(--accent-bg); color: var(--accent-text); padding: 1px 4px; border-radius: 3px; }

        .qblock { border: 0.5px solid var(--border); border-radius: var(--r); overflow: hidden; margin-top: 20px; }
        .q-head { padding: 10px 16px; background: var(--surface2); border-bottom: 0.5px solid var(--border); font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px; }
        .q-body { padding: 16px; }
        .q-text { font-size: 14px; color: var(--text); margin-bottom: 12px; line-height: 1.6; font-weight: 500; }
        .q-options { display: flex; flex-direction: column; gap: 6px; }
        .q-opt { padding: 10px 14px; border: 0.5px solid var(--border); border-radius: var(--r-sm); cursor: pointer; font-size: 13.5px; color: var(--text2); transition: all 0.15s; background: var(--surface); }
        .q-opt:hover { border-color: var(--accent); color: var(--text); }
        .q-opt.correct { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }
        .q-opt.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }
        .q-feedback { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: var(--r-sm); }
        .q-feedback.correct { background: var(--teal-bg); color: var(--teal); }
        .q-feedback.wrong { background: var(--red-bg); color: var(--red); }

        .osi-stack { display: flex; flex-direction: column; gap: 3px; margin: 16px 0; }
        .osi-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--r-sm); cursor: pointer; transition: opacity 0.15s; }
        .osi-row:hover { opacity: 0.85; }
        .osi-num { font-size: 11px; font-weight: 500; min-width: 16px; text-align: right; opacity: 0.7; }
        .osi-name { font-size: 13.5px; font-weight: 500; min-width: 100px; }
        .osi-tag { font-size: 11px; font-family: var(--font-mono, monospace); opacity: 0.75; margin-left: auto; background: rgba(255,255,255,0.25); padding: 2px 7px; border-radius: 3px; }

        .flow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
        @media(max-width: 600px) { .flow-grid { grid-template-columns: 1fr; } }
        .flow-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 16px; }
        .flow-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
        .flow-vis { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 10px 0; height: 32px; }
        .flow-node { font-size: 16px; }
        .flow-line { flex: 1; height: 2px; background: var(--border); border-radius: 2px; position: relative; overflow: visible; }
        .flow-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
        .ar { animation: arMove 1.8s linear infinite; }
        .al { animation: arMoveL 1.8s linear infinite; }
        @keyframes arMove { 0% { left: 0; } 100% { left: 100%; } }
        @keyframes arMoveL { 0% { left: 100%; } 100% { left: 0; } }
        .flow-desc { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

        .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
        .tag-level { background: var(--surface2); color: var(--text3); border: 0.5px solid var(--border); }

        .chapter-nav { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 16px; border-top: 0.5px solid var(--border); }
        .cnav-btn { padding: 7px 14px; border: 0.5px solid var(--border); border-radius: var(--r-sm); font-size: 12.5px; color: var(--text2); cursor: pointer; background: none; transition: all 0.15s; }
        .cnav-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
        .cnav-btn.primary { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); }

        .search-bar { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-sm); padding: 8px 12px; margin-bottom: 24px; }
        .search-bar input { background: none; border: none; outline: none; font-size: 14px; color: var(--text); flex: 1; font-family: inherit; }
        .search-bar input::placeholder { color: var(--text3); }
        .search-icon { color: var(--text3); font-size: 14px; }

        .no-results { text-align: center; padding: 60px 20px; color: var(--text3); }
        .no-results .nr-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
        .no-results p { font-size: 14px; }

        .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 12px 16px; flex: 1; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
        .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

        .nav-end { display: flex; gap: 10px; padding: 0 20px; margin-top: auto; border-top: 0.5px solid var(--border); padding-top: 15px; }
        .mode-btn { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); padding: 8px; border-radius: var(--r-sm); cursor: pointer; font-size: 14px; flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .mode-btn:hover { background: var(--accent-bg); color: var(--accent-text); }
    </style>
</head>
<body id="body">

<div class="app" id="app">
    <aside class="sidebar" id="sidebar">
        <div class="sb-brand">
            <div class="sb-logo">Net<span>Flow</span></div>
            <div class="sb-sub">Networking Concepts</div>
        </div>
        
        <div id="nav-tree"></div>

        <div class="sb-progress">
            <div class="sp-label"><span>Progress</span><span id="prog-count">0 / 20</span></div>
            <div class="sp-track"><div class="sp-fill" id="prog-fill" style="width:0%"></div></div>
        </div>

        <div class="nav-end">
            <button class="mode-btn" id="theme-toggle" title="Toggle Dark/Light">🌙</button>
            <a href="index.html" class="mode-btn" title="Back to Modern UI">✨ Modern</a>
        </div>
    </aside>

    <main class="main" id="main-content">
        <div class="page-header">
            <h1 class="page-title">Learn <em>Networking</em> Fundamentals</h1>
            <p class="page-desc">A comprehensive guide from the basics of data transfer to advanced global infrastructure and cybersecurity.</p>
            <div class="search-bar" style="margin-top:16px;margin-bottom:0">
                <span class="search-icon">⌕</span>
                <input type="text" id="search-input" placeholder="Search concepts, terms, protocols…">
            </div>
        </div>

        <div class="stats-row">
            <div class="stat"><div class="stat-val" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
            <div class="stat"><div class="stat-val">20</div><div class="stat-lbl">Chapters</div></div>
            <div class="stat"><div class="stat-val">6</div><div class="stat-lbl">Levels</div></div>
        </div>

        <div id="chapters-container"></div>
        
        <div class="no-results" id="no-results" style="display:none">
            <div class="nr-icon">◌</div>
            <p>Nothing found — try "router", "TCP", or "duplex"</p>
        </div>
    </main>
</div>

<script src="script.js"></script>

</body>
</html>
